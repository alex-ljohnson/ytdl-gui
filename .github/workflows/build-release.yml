name: Build and Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Sync versions from APP_VERSION
        run: python scripts/sync_versions.py

      - name: Build with PyInstaller
        run: >
          pyinstaller --name "DownloaderGUI"
          --version-file "GrabVersion.py"
          --specpath "build"
          --console
          -i "Resources\YTDLv2_256.ico"
          --hidden-import yt_dlp_ejs
          --hidden-import spotipy
          --hidden-import validators
          --hidden-import mutagen
          --add-data "README.md;."
          --add-data "LICENSE;."
          --add-data "modules/extensions;modules/extensions"
          --add-data "Info;Info"
          --add-data "Resources;Resources"
          --add-data "Logs;Logs"
          --add-data "tksvg0.7;tksvg0.7"
          --add-data "AtomicParsleyWindows;AtomicParsleyWindows"
          --add-data "awthemes-10.3.0;awthemes-10.3.0"
          --add-data "ffmpeg-7.1-essentials_build;ffmpeg-7.1-essentials_build"
          --add-data "quickjs;quickjs"
          __main__.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DNOSIGN YTDLGUISetupScript.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Youtube-dl GUI ${{ github.ref_name }}
          files: dist/Installer/Youtube-dl_GUI_Setup.exe
          generate_release_notes: true